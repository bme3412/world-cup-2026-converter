name: Checks

# Continuous monitoring: verifies the fixture set is complete (every group has
# its 6 matches → 72 total) and the app builds, on every push and PR.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Fixture completeness
        run: npm run check:fixtures
      - name: Build
        run: npm run build
